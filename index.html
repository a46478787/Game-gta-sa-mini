<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA San Andreas - Минимальная версия</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 100;
            font-size: 16px;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            z-index: 100;
            font-size: 14px;
        }
        
        #healthBar {
            width: 200px;
            height: 20px;
            background: #333;
            border: 2px solid #fff;
            margin-top: 10px;
        }
        
        #healthFill {
            width: 100%;
            height: 100%;
            background: #ff0000;
            transition: width 0.3s;
        }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <div>GTA San Andreas</div>
            <div>Здоровье: <span id="healthValue">100</span>%</div>
            <div id="healthBar">
                <div id="healthFill"></div>
            </div>
            <div>Позиция: <span id="position">0, 0, 0</span></div>
        </div>
        
        <div id="controls">
            <div>WASD - Движение</div>
            <div>Мышь - Осмотр</div>
            <div>Пробел - Прыжок</div>
            <div>E - Взаимодействие</div>
        </div>
        
        <div id="crosshair">+</div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
